<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChat-Real Time Socket Chat App</title>
    <script defer src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script defer src="./js/client.js"></script>


    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav>
        <img class="logo" src="chat.png" alt="Chat Logo">
        <h1>Welcome to my iChat-Real Socket Chat App.</h1>
    </nav>

    <div class="container">
        <!-- Messages will be dynamically added here -->

    </div>

    <div class="send">
        <form action="#" id="send-container">
            <input type="text" name="messageInp" id="messageInp" placeholder="Enter your message" required>
            <button class="btn" type="submit">Send</button>
        </form>
    </div>

</body>

</html>
